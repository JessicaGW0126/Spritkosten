<body class="bg-gray-50">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect } = React;

// --- Helper Functions ---
function formatDate(date) {
  if(!date) return "";
  const d = new Date(date);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function numberToWords(num) {
  const ones = ['', 'eins', 'zwei', 'drei', 'vier', 'fünf', 'sechs', 'sieben', 'acht', 'neun'];
  const teens = ['zehn', 'elf', 'zwölf', 'dreizehn', 'vierzehn', 'fünfzehn', 'sechzehn', 'siebzehn', 'achtzehn', 'neunzehn'];
  const tens = ['', '', 'zwanzig', 'dreißig', 'vierzig', 'fünfzig', 'sechzig', 'siebzig', 'achtzig', 'neunzig'];
  let euroValue = Math.floor(num);
  const cents = Math.round((num - euroValue) * 100);
  function convertUnder1000(n) {
    if (n < 10) return ones[n];
    if (n < 20) return teens[n - 10];
    if (n < 100) {
      const ten = Math.floor(n / 10);
      const one = n % 10;
      return one > 0 ? `${ones[one]}und${tens[ten]}` : tens[ten];
    }
    if (n < 1000) {
      const hundred = Math.floor(n / 100);
      const rest = n % 100;
      return `${ones[hundred]}hundert${rest > 0 ? convertUnder1000(rest) : ''}`;
    }
    return '';
  }
  let result = euroValue === 0 ? 'null' : convertUnder1000(euroValue);
  result += ' Euro';
  if (cents > 0) result += ` und ${cents} Cent`;
  return result.charAt(0).toUpperCase() + result.slice(1);
}

// --- App Component ---
function App() {
  const [fb, setFb] = useState(null);
  const [employees, setEmployees] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [selectedEmployee, setSelectedEmployee] = useState('');
  const [activeTab, setActiveTab] = useState('empfangen');
  
  // States for Inputs
  const [empfangenAmount, setEmpfangenAmount] = useState('');
  const [ausgabenAmount, setAusgabenAmount] = useState('');
  const [ausgabenMileage, setAusgabenMileage] = useState('');
  const [ausgabenVehicle, setAusgabenVehicle] = useState('');
  const [ausgabenFuelType, setAusgabenFuelType] = useState('');
  const [ausgabenDate, setAusgabenDate] = useState(new Date().toISOString().split('T')[0]);
  
  // UI States
  const [showFuelPopup, setShowFuelPopup] = useState(false);
  const [showCamera, setShowCamera] = useState(false);
  const [receiptImage, setReceiptImage] = useState('');
  const [history, setHistory] = useState([]);
  
  // Management States
  const [newEmpName, setNewEmpName] = useState('');
  const [newVehPlate, setNewVehPlate] = useState('');
  const [startDate, setStartDate] = useState(new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0]);
  const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);

  const signatureCanvasRef = useRef(null);
  const signaturePadRef = useRef(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);

  useEffect(() => {
    if (window.firebaseDB) setFb(window.firebaseDB);
    else window.addEventListener('firebase-ready', () => setFb(window.firebaseDB));
  }, []);

  useEffect(() => {
    if (fb) {
      loadEmployees();
      loadVehicles();
    }
  }, [fb]);

  useEffect(() => {
    if (fb && selectedEmployee) loadHistory(selectedEmployee);
  }, [fb, selectedEmployee]);

  // Handle Signature Pad Init & Precision
  useEffect(() => {
    if (activeTab === 'empfangen' && signatureCanvasRef.current) {
      const canvas = signatureCanvasRef.current;
      signaturePadRef.current = new SignaturePad(canvas);
      
      const resizeCanvas = () => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePadRef.current.clear();
      };
      
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
      return () => window.removeEventListener("resize", resizeCanvas);
    }
  }, [activeTab, selectedEmployee]);

  // Data Loading
  async function loadEmployees() {
    const snap = await fb.get(fb.ref(fb.database, 'employees'));
    if (snap.exists()) setEmployees(Object.entries(snap.val()).map(([id, v]) => ({ id, ...v })));
    else setEmployees([]);
  }
  async function loadVehicles() {
    const snap = await fb.get(fb.ref(fb.database, 'vehicles'));
    if (snap.exists()) setVehicles(Object.entries(snap.val()).map(([id, v]) => ({ id, ...v })));
    else setVehicles([]);
  }
  async function loadHistory(empId) {
    const [rSnap, eSnap] = await Promise.all([
      fb.get(fb.ref(fb.database, 'receipts')),
      fb.get(fb.ref(fb.database, 'expenses'))
    ]);
    let all = [];
    if (rSnap.exists()) Object.entries(rSnap.val()).forEach(([id, v]) => { if(v.employeeId === empId) all.push({...v, id, type: 'empfangen'}); });
    if (eSnap.exists()) Object.entries(eSnap.val()).forEach(([id, v]) => { if(v.employeeId === empId) all.push({...v, id, type: 'ausgaben'}); });
    setHistory(all.sort((a,b) => new Date(b.date) - new Date(a.date)));
  }

  // Delete Actions
  async function deleteEmployee(id, e) {
    e.stopPropagation();
    if(confirm("Mitarbeiter wirklich löschen?")) {
      await fb.remove(fb.ref(fb.database, `employees/${id}`));
      if(selectedEmployee === id) setSelectedEmployee('');
      loadEmployees();
    }
  }
  async function deleteVehicle(id, e) {
    e.stopPropagation();
    if(confirm("Fahrzeug wirklich löschen?")) {
      await fb.remove(fb.ref(fb.database, `vehicles/${id}`));
      loadVehicles();
    }
  }
  async function deleteHistoryItem(item) {
    if(confirm("Diesen Eintrag wirklich löschen?")) {
      const path = item.type === 'empfangen' ? 'receipts' : 'expenses';
      await fb.remove(fb.ref(fb.database, `${path}/${item.id}`));
      loadHistory(selectedEmployee);
    }
  }

  // Camera Logic
  async function startCamera() {
    setShowCamera(true);
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    streamRef.current = stream;
    if (videoRef.current) videoRef.current.srcObject = stream;
  }
  function capturePhoto() {
    const canvas = document.createElement('canvas');
    canvas.width = videoRef.current.videoWidth;
    canvas.height = videoRef.current.videoHeight;
    canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
    setReceiptImage(canvas.toDataURL('image/jpeg'));
    stopCamera();
  }
  function stopCamera() {
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    setShowCamera(false);
  }

  // PDF Generation
  function generateReceiptPDF(item) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const emp = employees.find(e => e.id === item.employeeId);
    doc.setFontSize(22);
    doc.text("GW Bauservice", 105, 20, { align: "center" });
    doc.setFontSize(14);
    doc.text("Spritgeld Quittung", 105, 30, { align: "center" });
    doc.line(20, 35, 190, 35);
    
    doc.setFontSize(12);
    doc.text(`Datum: ${formatDate(item.date)}`, 20, 50);
    doc.text(`Ort: Zahna`, 20, 60);
    doc.text(`Herausgeber: GW Bauservice`, 20, 70);
    doc.text(`Zweck: Spritgeld`, 20, 80);
    doc.text(`Empfänger: ${emp?.name || 'Unbekannt'}`, 20, 100);
    doc.setFont("helvetica", "bold");
    doc.text(`Betrag: ${parseFloat(item.amount).toFixed(2)} EUR`, 20, 115);
    doc.setFont("helvetica", "normal");
    doc.text(`In Worten: ${numberToWords(item.amount)}`, 20, 125);
    
    if (item.signature) {
      doc.text("Unterschrift:", 20, 150);
      doc.addImage(item.signature, 'PNG', 20, 155, 60, 30);
    }
    doc.save(`Quittung_${emp?.name}_${formatDate(item.date)}.pdf`);
  }

  function generateExpensePDF(item) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const emp = employees.find(e => e.id === item.employeeId);
    const veh = vehicles.find(v => v.id === item.vehicleId);
    doc.setFontSize(22);
    doc.text("GW Bauservice", 105, 20, { align: "center" });
    doc.setFontSize(14);
    doc.text("Tankbeleg Dokumentation", 105, 30, { align: "center" });
    doc.line(20, 35, 190, 35);

    doc.autoTable({
      startY: 50,
      head: [['Feld', 'Details']],
      body: [
        ['Datum', formatDate(item.date)],
        ['Herausgeber', 'GW Bauservice'],
        ['Mitarbeiter', emp?.name || ''],
        ['Fahrzeug', veh?.licensePlate || ''],
        ['KM-Stand', item.mileage],
        ['Kraftstoff', item.fuelType],
        ['Betrag', `${parseFloat(item.amount).toFixed(2)} EUR`]
      ],
      theme: 'grid'
    });

    if (item.receiptImage) {
      doc.addPage();
      doc.text("Tankbeleg Foto:", 20, 20);
      doc.addImage(item.receiptImage, 'JPEG', 20, 30, 170, 120);
    }
    doc.save(`Tankbeleg_${emp?.name}_${formatDate(item.date)}.pdf`);
  }

  // Save Handlers
  async function handleSaveEmpfangen() {
    if(!empfangenAmount || signaturePadRef.current.isEmpty()) return alert("Betrag und Unterschrift fehlen!");
    const item = {
      employeeId: selectedEmployee,
      amount: parseFloat(empfangenAmount),
      signature: signaturePadRef.current.toDataURL(),
      date: new Date().toISOString(),
      type: 'empfangen'
    };
    await fb.push(fb.ref(fb.database, 'receipts'), item);
    generateReceiptPDF(item);
    setEmpfangenAmount('');
    signaturePadRef.current.clear();
    loadHistory(selectedEmployee);
  }

  async function handleSaveAusgaben() {
    if(!ausgabenAmount || !ausgabenVehicle || !ausgabenFuelType) return alert("Alle Felder ausfüllen!");
    const item = {
      employeeId: selectedEmployee,
      vehicleId: ausgabenVehicle,
      amount: parseFloat(ausgabenAmount),
      mileage: ausgabenMileage,
      fuelType: ausgabenFuelType,
      date: new Date(ausgabenDate).toISOString(),
      receiptImage,
      type: 'ausgaben'
    };
    await fb.push(fb.ref(fb.database, 'expenses'), item);
    generateExpensePDF(item);
    setAusgabenAmount(''); setAusgabenMileage(''); setAusgabenVehicle(''); setAusgabenFuelType(''); setReceiptImage('');
    loadHistory(selectedEmployee);
  }

  // Export
  function exportExcel() {
    const stats = calculateStats();
    const data = stats.items.map(i => ({
      Datum: formatDate(i.date),
      Typ: i.type,
      Betrag: i.amount,
      Info: i.type === 'ausgaben' ? i.fuelType : 'Spritgeld'
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Übersicht");
    XLSX.writeFile(wb, "Spritkosten_Uebersicht.xlsx");
  }

  function calculateStats() {
    const start = new Date(startDate); start.setHours(0,0,0,0);
    const end = new Date(endDate); end.setHours(23,59,59,999);
    const filtered = history.filter(i => {
      const d = new Date(i.date);
      return d >= start && d <= end;
    });
    const emp = filtered.filter(i => i.type === 'empfangen').reduce((a,b) => a + b.amount, 0);
    const aus = filtered.filter(i => i.type === 'ausgaben').reduce((a,b) => a + b.amount, 0);
    return { emp, aus, diff: emp - aus, items: filtered };
  }

  const stats = calculateStats();

  return (
    <div className="max-w-4xl mx-auto p-4 pb-20">
      {/* Header */}
      <header className="text-center mb-8">
        <img src="https://i.ibb.co/6R0D5x0/GW-Logo.png" alt="GW Bauservice" className="mx-auto h-32 mb-4" />
        <h1 className="text-3xl font-bold text-gray-800">Spritkosten</h1>
      </header>

      {/* Employee Selection */}
      <section className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
        <h2 className="text-lg font-semibold mb-4">Mitarbeiter auswählen</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          {employees.map(e => (
            <div 
              key={e.id} 
              onClick={() => setSelectedEmployee(e.id)}
              className={`p-4 rounded-xl border-2 cursor-pointer flex justify-between items-center transition-all ${selectedEmployee === e.id ? 'border-blue-500 bg-blue-50' : 'border-gray-100 hover:border-blue-200'}`}
            >
              <span className="font-medium">{e.name}</span>
              <button onClick={(event) => deleteEmployee(e.id, event)} className="text-red-400 hover:text-red-600 p-1">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={newEmpName} onChange={e => setNewEmpName(e.target.value)} placeholder="Neuer Mitarbeiter Name" className="flex-1 p-3 bg-gray-50 rounded-lg outline-none focus:ring-2 focus:ring-blue-400" />
          <button onClick={addEmployee} className="bg-blue-600 text-white px-6 rounded-lg font-bold">+</button>
        </div>
      </section>

      {selectedEmployee && (
        <>
          {/* Tabs */}
          <div className="flex bg-white p-1 rounded-xl shadow-sm border border-gray-100 mb-6">
            {['empfangen', 'ausgaben', 'uebersicht'].map(t => (
              <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 rounded-lg font-bold capitalize transition-all ${activeTab === t ? 'bg-blue-600 text-white shadow-md' : 'text-gray-500'}`}>
                {t}
              </button>
            ))}
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 min-h-[400px]">
            {activeTab === 'empfangen' && (
              <div className="space-y-6">
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-2">Empfangener Betrag (€)</label>
                  <input type="number" value={empfangenAmount} onChange={e => setEmpfangenAmount(e.target.value)} placeholder="0.00" className="w-full p-4 bg-gray-50 rounded-xl text-2xl font-bold outline-none border-2 border-transparent focus:border-blue-400" />
                </div>
                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-2">Unterschrift</label>
                  <div className="border-2 border-gray-100 rounded-xl bg-gray-50 overflow-hidden">
                    <canvas ref={signatureCanvasRef} className="w-full h-48 touch-none"></canvas>
                  </div>
                  <button onClick={() => signaturePadRef.current.clear()} className="mt-2 text-sm text-blue-600 font-bold">Löschen</button>
                </div>
                <button onClick={handleSaveEmpfangen} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">Vorgang abschließen & Quittung erstellen</button>
              </div>
            )}

            {activeTab === 'ausgaben' && (
              <div className="space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-bold text-gray-600 mb-2">Fahrzeug</label>
                    <div className="space-y-2">
                      <select value={ausgabenVehicle} onChange={e => setAusgabenVehicle(e.target.value)} className="w-full p-3 bg-gray-50 rounded-lg outline-none">
                        <option value="">Wählen...</option>
                        {vehicles.map(v => <option key={v.id} value={v.id}>{v.licensePlate}</option>)}
                      </select>
                      <div className="flex gap-2">
                        <input value={newVehPlate} onChange={e => setNewVehPlate(e.target.value)} placeholder="Neues Kennzeichen" className="flex-1 p-2 bg-gray-50 rounded text-sm" />
                        <button onClick={addVehicle} className="bg-green-600 text-white px-3 rounded">+</button>
                        {ausgabenVehicle && <button onClick={(e) => deleteVehicle(ausgabenVehicle, e)} className="bg-red-500 text-white px-3 rounded">Löschen</button>}
                      </div>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-600 mb-2">Datum</label>
                    <input type="date" value={ausgabenDate} onChange={e => setAusgabenDate(e.target.value)} className="w-full p-3 bg-gray-50 rounded-lg outline-none" />
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-bold text-gray-600 mb-2">Kilometerstand</label>
                    <input type="number" value={ausgabenMileage} onChange={e => setAusgabenMileage(e.target.value)} placeholder="KM" className="w-full p-3 bg-gray-50 rounded-lg outline-none" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-600 mb-2">Betrag (€)</label>
                    <input type="number" value={ausgabenAmount} onChange={e => setAusgabenAmount(e.target.value)} placeholder="0.00" className="w-full p-3 bg-gray-50 rounded-lg outline-none" />
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-2">Kraftstoffart</label>
                  <div className="grid grid-cols-3 gap-2">
                    {['Diesel', 'Benzin', 'Ad-Blue'].map(f => (
                      <button key={f} onClick={() => setAusgabenFuelType(f)} className={`p-3 rounded-lg font-bold border-2 transition-all ${ausgabenFuelType === f ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-gray-100 text-gray-500'}`}>{f}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-bold text-gray-600 mb-2">Beleg Foto</label>
                  {receiptImage ? (
                    <div className="relative inline-block">
                      <img src={receiptImage} className="h-32 rounded-lg border" />
                      <button onClick={() => setReceiptImage('')} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </div>
                  ) : (
                    <button onClick={startCamera} className="w-full py-8 border-2 border-dashed border-gray-200 rounded-xl text-gray-400 hover:border-blue-400 hover:text-blue-400 transition-all">
                      📷 Beleg fotografieren
                    </button>
                  )}
                </div>

                <button onClick={handleSaveAusgaben} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">Vorgang abschließen & PDF speichern</button>
              </div>
            )}

            {activeTab === 'uebersicht' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 gap-4">
                  <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="p-3 bg-gray-50 rounded-lg outline-none" />
                  <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="p-3 bg-gray-50 rounded-lg outline-none" />
                </div>

                <div className="grid grid-cols-3 gap-3">
                  <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                    <p className="text-xs font-bold text-green-600 uppercase">Erhalt</p>
                    <p className="text-xl font-black text-green-700">{stats.emp.toFixed(2)}€</p>
                  </div>
                  <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                    <p className="text-xs font-bold text-red-600 uppercase">Ausgabe</p>
                    <p className="text-xl font-black text-red-700">{stats.aus.toFixed(2)}€</p>
                  </div>
                  <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <p className="text-xs font-bold text-blue-600 uppercase">Saldo</p>
                    <p className="text-xl font-black text-blue-700">{stats.diff.toFixed(2)}€</p>
                  </div>
                </div>

                <div className="flex gap-2">
                  <button onClick={exportExcel} className="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">Excel Export</button>
                </div>

                <div className="border-t pt-4">
                  <h3 className="font-bold mb-3">Historie</h3>
                  <div className="space-y-2">
                    {stats.items.map(item => (
                      <div key={item.id} className="p-3 bg-gray-50 rounded-lg flex items-center justify-between group">
                        <div className="flex items-center gap-3">
                          <span className={`w-2 h-2 rounded-full ${item.type === 'empfangen' ? 'bg-green-500' : 'bg-red-500'}`}></span>
                          <div>
                            <p className="text-sm font-bold">{formatDate(item.date)}</p>
                            <p className="text-xs text-gray-500">{item.type === 'empfangen' ? 'Spritgeld erhalten' : 'Tankvorgang'}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className={`font-bold ${item.type === 'empfangen' ? 'text-green-600' : 'text-red-600'}`}>
                            {item.type === 'empfangen' ? '+' : '-'}{item.amount.toFixed(2)}€
                          </span>
                          <button onClick={() => item.type === 'empfangen' ? generateReceiptPDF(item) : generateExpensePDF(item)} className="p-2 bg-white rounded shadow-sm text-blue-600">
                            PDF
                          </button>
                          <button onClick={() => deleteHistoryItem(item)} className="p-2 bg-white rounded shadow-sm text-red-500">
                            🗑️
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </>
      )}

      {/* Camera Modal */}
      {showCamera && (
        <div className="fixed inset-0 bg-black z-50 flex flex-col p-4">
          <video ref={videoRef} autoPlay playsInline className="flex-1 rounded-2xl bg-gray-900 object-cover" />
          <div className="flex justify-center gap-6 py-8">
            <button onClick={stopCamera} className="bg-white/20 text-white px-8 py-3 rounded-full font-bold">Abbrechen</button>
            <button onClick={capturePhoto} className="bg-white w-20 h-20 rounded-full border-8 border-gray-300"></button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
