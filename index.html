<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GW Bauservice - Spritkostenverwaltung</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, get, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2KRg-aaN03pnRbhV6IoF-MGO6g1ezngI",
    authDomain: "spritkosten-e94fd.firebaseapp.com",
    databaseURL: "https://spritkosten-e94fd-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "spritkosten-e94fd",
    storageBucket: "spritkosten-e94fd.firebasestorage.app",
    messagingSenderId: "1044644907793",
    appId: "1:1044644907793:web:136c51669986ebb4cf5ab0",
    measurementId: "G-HC4K2N649J"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  window.firebaseDB = { database, ref, push, get, remove, set };
  window.dispatchEvent(new Event('firebase-ready'));
</script>
</head>
<body class="bg-gray-50">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect } = React;

function formatDate(date) {
  if(!date) return "";
  const d = new Date(date);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function numberToWords(num) {
  const ones = ['', 'eins', 'zwei', 'drei', 'vier', 'fünf', 'sechs', 'sieben', 'acht', 'neun'];
  const teens = ['zehn', 'elf', 'zwölf', 'dreizehn', 'vierzehn', 'fünfzehn', 'sechzehn', 'siebzehn', 'achtzehn', 'neunzehn'];
  const tens = ['', '', 'zwanzig', 'dreißig', 'vierzig', 'fünfzig', 'sechzig', 'siebzig', 'achtzig', 'neunzig'];
  let euroValue = Math.floor(num);
  const cents = Math.round((num - euroValue) * 100);
  function convertUnder1000(n) {
    if (n < 10) return ones[n];
    if (n < 20) return teens[n - 10];
    if (n < 100) {
      const ten = Math.floor(n / 10);
      const one = n % 10;
      return one > 0 ? `${ones[one]}und${tens[ten]}` : tens[ten];
    }
    if (n < 1000) {
      const hundred = Math.floor(n / 100);
      const rest = n % 100;
      return `${ones[hundred]}hundert${rest > 0 ? convertUnder1000(rest) : ''}`;
    }
    return '';
  }
  let result = euroValue === 0 ? 'null' : convertUnder1000(euroValue);
  result += ' Euro';
  if (cents > 0) result += ` und ${cents} Cent`;
  return result.charAt(0).toUpperCase() + result.slice(1);
}

function App() {
  const [fb, setFb] = useState(null);
  const [employees, setEmployees] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [selectedEmployee, setSelectedEmployee] = useState('');
  const [activeTab, setActiveTab] = useState('empfangen');
  
  const [empfangenAmount, setEmpfangenAmount] = useState('');
  const [ausgabenAmount, setAusgabenAmount] = useState('');
  const [ausgabenMileage, setAusgabenMileage] = useState('');
  const [ausgabenVehicle, setAusgabenVehicle] = useState('');
  const [ausgabenFuelType, setAusgabenFuelType] = useState('');
  const [ausgabenDate, setAusgabenDate] = useState(new Date().toISOString().split('T')[0]);
  
  const [showCamera, setShowCamera] = useState(false);
  const [receiptImage, setReceiptImage] = useState('');
  const [history, setHistory] = useState([]);
  const [newEmpName, setNewEmpName] = useState('');
  const [newVehPlate, setNewVehPlate] = useState('');
  const [startDate, setStartDate] = useState(new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0]);
  const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);

  const signatureCanvasRef = useRef(null);
  const signaturePadRef = useRef(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);

  useEffect(() => {
    if (window.firebaseDB) setFb(window.firebaseDB);
    else window.addEventListener('firebase-ready', () => setFb(window.firebaseDB));
  }, []);

  useEffect(() => {
    if (fb) { loadEmployees(); loadVehicles(); }
  }, [fb]);

  useEffect(() => {
    if (fb && selectedEmployee) loadHistory(selectedEmployee);
  }, [fb, selectedEmployee]);

  useEffect(() => {
    if (activeTab === 'empfangen' && signatureCanvasRef.current) {
      const canvas = signatureCanvasRef.current;
      signaturePadRef.current = new SignaturePad(canvas);
      const resize = () => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePadRef.current.clear();
      };
      window.addEventListener("resize", resize);
      resize();
      return () => window.removeEventListener("resize", resize);
    }
  }, [activeTab, selectedEmployee]);

  async function loadEmployees() {
    const snap = await fb.get(fb.ref(fb.database, 'employees'));
    setEmployees(snap.exists() ? Object.entries(snap.val()).map(([id, v]) => ({ id, ...v })) : []);
  }
  async function loadVehicles() {
    const snap = await fb.get(fb.ref(fb.database, 'vehicles'));
    setVehicles(snap.exists() ? Object.entries(snap.val()).map(([id, v]) => ({ id, ...v })) : []);
  }
  async function loadHistory(empId) {
    const [rSnap, eSnap] = await Promise.all([fb.get(fb.ref(fb.database, 'receipts')), fb.get(fb.ref(fb.database, 'expenses'))]);
    let all = [];
    if (rSnap.exists()) Object.entries(rSnap.val()).forEach(([id, v]) => { if(v.employeeId === empId) all.push({...v, id, type: 'empfangen'}); });
    if (eSnap.exists()) Object.entries(eSnap.val()).forEach(([id, v]) => { if(v.employeeId === empId) all.push({...v, id, type: 'ausgaben'}); });
    setHistory(all.sort((a,b) => new Date(b.date) - new Date(a.date)));
  }

  async function addEmployee() { if(newEmpName.trim()) { await fb.push(fb.ref(fb.database, 'employees'), { name: newEmpName.trim() }); setNewEmpName(''); loadEmployees(); } }
  async function addVehicle() { if(newVehPlate.trim()) { await fb.push(fb.ref(fb.database, 'vehicles'), { licensePlate: newVehPlate.trim().toUpperCase() }); setNewVehPlate(''); loadVehicles(); } }
  async function deleteEmployee(id, e) { e.stopPropagation(); if(confirm("Mitarbeiter löschen?")) { await fb.remove(fb.ref(fb.database, `employees/${id}`)); if(selectedEmployee === id) setSelectedEmployee(''); loadEmployees(); } }
  async function deleteVehicle(id, e) { e.stopPropagation(); if(confirm("Fahrzeug löschen?")) { await fb.remove(fb.ref(fb.database, `vehicles/${id}`)); loadVehicles(); } }
  async function deleteHistoryItem(item) { if(confirm("Eintrag löschen?")) { await fb.remove(fb.ref(fb.database, `${item.type === 'empfangen' ? 'receipts' : 'expenses'}/${item.id}`)); loadHistory(selectedEmployee); } }

  async function startCamera() { setShowCamera(true); try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); streamRef.current = s; if (videoRef.current) videoRef.current.srcObject = s; } catch (e) { setShowCamera(false); } }
  function capturePhoto() { const c = document.createElement('canvas'); c.width = videoRef.current.videoWidth; c.height = videoRef.current.videoHeight; c.getContext('2d').drawImage(videoRef.current, 0, 0); setReceiptImage(c.toDataURL('image/jpeg')); stopCamera(); }
  function stopCamera() { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); setShowCamera(false); }

  function generateReceiptPDF(item) {
    const { jsPDF } = window.jspdf; const doc = new jsPDF(); const emp = employees.find(e => e.id === item.employeeId);
    doc.setFontSize(22); doc.text("GW Bauservice", 105, 20, { align: "center" });
    doc.setFontSize(14); doc.text("Spritgeld Quittung", 105, 30, { align: "center" });
    doc.line(20, 35, 190, 35); doc.setFontSize(12);
    doc.text(`Datum: ${formatDate(item.date)}`, 20, 50); doc.text(`Ort: Zahna`, 20, 60);
    doc.text(`Herausgeber: GW Bauservice`, 20, 70); doc.text(`Empfänger: ${emp?.name || ''}`, 20, 90);
    doc.setFont("helvetica", "bold"); doc.text(`Betrag: ${parseFloat(item.amount).toFixed(2)} EUR`, 20, 110);
    doc.setFont("helvetica", "normal"); doc.text(`In Worten: ${numberToWords(item.amount)}`, 20, 120);
    if (item.signature) { doc.text("Unterschrift:", 20, 150); doc.addImage(item.signature, 'PNG', 20, 155, 60, 30); }
    doc.save(`Quittung_${emp?.name}.pdf`);
  }

  function generateExpensePDF(item) {
    const { jsPDF } = window.jspdf; const doc = new jsPDF(); const emp = employees.find(e => e.id === item.employeeId); const veh = vehicles.find(v => v.id === item.vehicleId);
    doc.setFontSize(22); doc.text("GW Bauservice", 105, 20, { align: "center" });
    doc.setFontSize(14); doc.text("Tankbeleg", 105, 30, { align: "center" });
    doc.autoTable({ startY: 50, head: [['Feld', 'Details']], body: [['Datum', formatDate(item.date)], ['Mitarbeiter', emp?.name || ''], ['Fahrzeug', veh?.licensePlate || ''], ['KM-Stand', item.mileage], ['Kraftstoff', item.fuelType], ['Betrag', `${parseFloat(item.amount).toFixed(2)} EUR`]] });
    if (item.receiptImage) { doc.addPage(); doc.addImage(item.receiptImage, 'JPEG', 20, 20, 170, 120); }
    doc.save(`Tankbeleg_${emp?.name}.pdf`);
  }

  async function handleSaveEmpfangen() {
    if(!empfangenAmount || signaturePadRef.current.isEmpty()) return alert("Daten unvollständig!");
    const item = { employeeId: selectedEmployee, amount: parseFloat(empfangenAmount), signature: signaturePadRef.current.toDataURL(), date: new Date().toISOString(), type: 'empfangen' };
    await fb.push(fb.ref(fb.database, 'receipts'), item);
    generateReceiptPDF(item); setEmpfangenAmount(''); signaturePadRef.current.clear(); loadHistory(selectedEmployee);
  }

  async function handleSaveAusgaben() {
    if(!ausgabenAmount || !ausgabenVehicle || !ausgabenFuelType) return alert("Daten unvollständig!");
    const item = { employeeId: selectedEmployee, vehicleId: ausgabenVehicle, amount: parseFloat(ausgabenAmount), mileage: ausgabenMileage, fuelType: ausgabenFuelType, date: new Date(ausgabenDate).toISOString(), receiptImage, type: 'ausgaben' };
    await fb.push(fb.ref(fb.database, 'expenses'), item);
    generateExpensePDF(item); setAusgabenAmount(''); setAusgabenMileage(''); setAusgabenVehicle(''); setAusgabenFuelType(''); setReceiptImage(''); loadHistory(selectedEmployee);
  }

  function calculateStats() {
    const s = new Date(startDate); s.setHours(0,0,0,0); const e = new Date(endDate); e.setHours(23,59,59,999);
    const filtered = history.filter(i => { const d = new Date(i.date); return d >= s && d <= e; });
    const emp = filtered.filter(i => i.type === 'empfangen').reduce((a,b) => a + b.amount, 0);
    const aus = filtered.filter(i => i.type === 'ausgaben').reduce((a,b) => a + b.amount, 0);
    return { emp, aus, diff: emp - aus, items: filtered };
  }

  function exportExcel() {
    const stats = calculateStats();
    const data = stats.items.map(i => {
        const v = vehicles.find(veh => veh.id === i.vehicleId);
        return {
            Datum: formatDate(i.date),
            Typ: i.type === 'empfangen' ? 'Erhalt' : 'Ausgabe',
            Betrag: i.amount,
            Kennzeichen: v ? v.licensePlate : '-',
            KM_Stand: i.mileage || '-',
            Kraftstoff: i.fuelType || 'Spritgeld'
        };
    });
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Übersicht"); XLSX.writeFile(wb, "Spritkosten.xlsx");
  }

  function exportPDF() {
    const { jsPDF } = window.jspdf; const doc = new jsPDF(); const stats = calculateStats(); const emp = employees.find(e => e.id === selectedEmployee);
    doc.text(`Übersicht: ${emp?.name || ''}`, 20, 20);
    doc.autoTable({ startY: 30, head: [['Datum', 'Typ', 'Betrag', 'KFZ', 'KM', 'Sprit']], body: stats.items.map(i => [formatDate(i.date), i.type === 'empfangen' ? 'Erhalt' : 'Ausgabe', i.amount.toFixed(2), vehicles.find(v => v.id === i.vehicleId)?.licensePlate || '-', i.mileage || '-', i.fuelType || '-']) });
    doc.save("Uebersicht.pdf");
  }

  if (!fb) return <div className="flex h-screen items-center justify-center">Lade...</div>;
  const stats = calculateStats();

  return (
    <div className="max-w-4xl mx-auto p-4 pb-20">
      <header className="text-center mb-8">
        <img src="https://i.ibb.co/C0mXN3F/GW-Logo.png" alt="GW Bauservice" className="mx-auto h-24 mb-4 object-contain" />
        <h1 className="text-3xl font-bold text-gray-800">Spritkosten</h1>
      </header>

      <section className="bg-white p-6 rounded-2xl shadow-sm border mb-6">
        <h2 className="text-lg font-semibold mb-4 text-center">Mitarbeiter auswählen</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          {employees.map(e => (
            <div key={e.id} onClick={() => setSelectedEmployee(e.id)} className={`p-4 rounded-xl border-2 cursor-pointer flex justify-between items-center transition-all ${selectedEmployee === e.id ? 'border-blue-500 bg-blue-50' : 'border-gray-100'}`}>
              <span className="font-medium">{e.name}</span>
              <button onClick={(event) => deleteEmployee(e.id, event)} className="text-red-400">🗑️</button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input value={newEmpName} onChange={e => setNewEmpName(e.target.value)} placeholder="Name..." className="flex-1 p-3 bg-gray-50 rounded-lg border outline-none" />
          <button onClick={addEmployee} className="bg-blue-600 text-white px-6 rounded-lg font-bold">+</button>
        </div>
      </section>

      {selectedEmployee && (
        <>
          <div className="flex bg-white p-1 rounded-xl shadow-sm border mb-6">
            {['empfangen', 'ausgaben', 'uebersicht'].map(t => (
              <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 rounded-lg font-bold capitalize transition-all ${activeTab === t ? 'bg-blue-600 text-white' : 'text-gray-500'}`}>{t}</button>
            ))}
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border min-h-[400px]">
            {activeTab === 'empfangen' && (
              <div className="space-y-6">
                <input type="number" value={empfangenAmount} onChange={e => setEmpfangenAmount(e.target.value)} placeholder="Betrag €" className="w-full p-4 bg-gray-50 rounded-xl text-2xl font-bold border outline-none" />
                <div className="border-2 rounded-xl bg-gray-50 overflow-hidden"><canvas ref={signatureCanvasRef} className="w-full h-48 touch-none"></canvas></div>
                <button onClick={() => signaturePadRef.current.clear()} className="text-sm text-blue-600">Löschen</button>
                <button onClick={handleSaveEmpfangen} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">Speichern & Quittung</button>
              </div>
            )}

            {activeTab === 'ausgaben' && (
              <div className="space-y-4">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="space-y-2">
                    <select value={ausgabenVehicle} onChange={e => setAusgabenVehicle(e.target.value)} className="w-full p-3 bg-gray-50 rounded-lg border">
                      <option value="">Fahrzeug...</option>
                      {vehicles.map(v => <option key={v.id} value={v.id}>{v.licensePlate}</option>)}
                    </select>
                    <div className="flex gap-1"><input value={newVehPlate} onChange={e => setNewVehPlate(e.target.value)} placeholder="KFZ..." className="flex-1 p-2 bg-gray-50 rounded border text-xs" /><button onClick={addVehicle} className="bg-green-600 text-white px-2 rounded">+</button>{ausgabenVehicle && <button onClick={(e) => deleteVehicle(ausgabenVehicle, e)} className="bg-red-500 text-white px-2 rounded">🗑️</button>}</div>
                  </div>
                  <input type="date" value={ausgabenDate} onChange={e => setAusgabenDate(e.target.value)} className="w-full p-3 bg-gray-50 rounded-lg border" />
                </div>
                <div className="grid grid-cols-2 gap-4"><input type="number" value={ausgabenMileage} onChange={e => setAusgabenMileage(e.target.value)} placeholder="KM-Stand" className="p-3 bg-gray-50 rounded-lg border" /><input type="number" value={ausgabenAmount} onChange={e => setAusgabenAmount(e.target.value)} placeholder="Betrag €" className="p-3 bg-gray-50 rounded-lg border" /></div>
                <div className="grid grid-cols-3 gap-2">{['Diesel', 'Benzin', 'Ad-Blue'].map(f => (<button key={f} onClick={() => setAusgabenFuelType(f)} className={`p-3 rounded-lg font-bold border-2 ${ausgabenFuelType === f ? 'border-blue-500 bg-blue-50 text-blue-600' : 'border-gray-100'}`}>{f}</button>))}</div>
                <button onClick={startCamera} className="w-full py-6 border-2 border-dashed rounded-xl text-gray-400">{receiptImage ? "✓ Bild gespeichert" : "📷 Beleg fotografieren"}</button>
                <button onClick={handleSaveAusgaben} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">Speichern</button>
              </div>
            )}

            {activeTab === 'uebersicht' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 gap-2"><input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="p-2 bg-gray-50 rounded border" /><input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="p-2 bg-gray-50 rounded border" /></div>
                <div className="grid grid-cols-3 gap-2 text-center text-xs font-bold"><div className="bg-green-50 p-3 rounded border">Erhalt: {stats.emp.toFixed(2)}€</div><div className="bg-red-50 p-3 rounded border">Ausgabe: {stats.aus.toFixed(2)}€</div><div className="bg-blue-50 p-3 rounded border">Saldo: {stats.diff.toFixed(2)}€</div></div>
                <div className="flex gap-2"><button onClick={exportExcel} className="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">Excel</button><button onClick={exportPDF} className="flex-1 bg-red-600 text-white py-3 rounded-lg font-bold">PDF</button></div>
                <div className="space-y-2 max-h-[300px] overflow-auto">
                  {stats.items.map(item => (
                    <div key={item.id} className="p-3 bg-gray-50 rounded flex items-center justify-between border text-xs">
                      <div><p className="font-bold">{formatDate(item.date)}</p><p className="text-gray-400">{vehicles.find(v => v.id === item.vehicleId)?.licensePlate || 'Spritgeld'}</p></div>
                      <div className="flex items-center gap-2"><span className="font-bold">{item.amount.toFixed(2)}€</span><button onClick={() => item.type === 'empfangen' ? generateReceiptPDF(item) : generateExpensePDF(item)} className="p-1 border rounded">PDF</button><button onClick={() => deleteHistoryItem(item)} className="p-1 border rounded text-red-500">🗑️</button></div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </>
      )}

      {showCamera && (
        <div className="fixed inset-0 bg-black z-50 flex flex-col"><video ref={videoRef} autoPlay playsInline className="flex-1 object-cover" />
          <div className="flex justify-center gap-6 py-10 bg-black"><button onClick={stopCamera} className="text-white bg-red-600 px-6 py-2 rounded-full font-bold">Abbruch</button><button onClick={capturePhoto} className="w-20 h-20 bg-white rounded-full border-4 border-gray-400"></button></div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
